name: CI

on:
  push:
    branches: [main]

jobs:
  build:
    if: ${{ !startsWith(github.event.head_commit.message, 'ci:') }}
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push images
        env:
          REGISTRY: ghcr.io
          IMAGE_OWNER: ${{ github.actor }}
          SHA: ${{ github.sha }}
        run: |
          for svc in gateway events payments; do
            docker build -t "${REGISTRY}/${IMAGE_OWNER}/quickticket-${svc}:${SHA}" "./app/${svc}"
            docker push "${REGISTRY}/${IMAGE_OWNER}/quickticket-${svc}:${SHA}"
          done

      - name: Update image tags in manifests
        run: |
          SHA=${{ github.sha }}
          OWNER=${{ github.actor }}
          sed -i "s|image: ghcr.io/.*/quickticket-gateway:.*|image: ghcr.io/${OWNER}/quickticket-gateway:${SHA}|" k8s/gateway.yaml
          sed -i "s|image: ghcr.io/.*/quickticket-events:.*|image: ghcr.io/${OWNER}/quickticket-events:${SHA}|" k8s/events.yaml
          sed -i "s|image: ghcr.io/.*/quickticket-payments:.*|image: ghcr.io/${OWNER}/quickticket-payments:${SHA}|" k8s/payments.yaml

      - name: Commit and push manifest update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f k8s/gateway.yaml k8s/events.yaml k8s/payments.yaml
          git diff --cached --quiet || git commit -m "ci: update image tags to ${{ github.sha }}"
          git push
